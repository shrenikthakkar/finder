spring.application.name=letscheck
spring.data.mongodb.uri=mongodb://localhost:27017/letscheck
server.port=8080
spring.data.mongodb.auto-index-creation=true
app.jwt.secret=${APP_JWT_SECRET:VGhpc0lzQVN1cGVyU2VjcmV0S2V5Rm9ySldUQXV0aEZpbmRlckFwcDEyMzQ1Njc4OTA=}
app.jwt.expiration-ms=604800000
logging.level.com.finder.letscheck=INFO

# -----------------------------
# Async executor notes:
# Real sizing lives in AsyncConfig.java
# These properties are for request handling / shutdown / visibility.
# -----------------------------

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Tomcat request threads (HTTP request handling, not @Async threads)
server.tomcat.threads.max=100
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100

# Connection timeout
server.tomcat.connection-timeout=20s